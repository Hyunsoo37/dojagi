<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>수작업 도자기 쇼핑몰</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: blanchedalmond;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #da9f57;
            padding: 30px 0;
            text-align: center;
        }

        header h1 {
            color: #5c3d2e;
            font-size: 60px;
            margin: 0;
        }

        .subtitle {
            text-align: center;
            font-size: 20px;
            color: #5c3d2e;
            margin-top: 10px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 30px;
        }

        .product {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 20px;
            width: 300px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .product img {
            max-width: 100%;
            border-radius: 10px;
        }

        .product h2 {
            color: #8b5e3c;
            font-size: 24px;
            margin: 15px 0 10px;
        }

        .product p {
            color: #5c3d2e;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header>
        <h1>도자기</h1>
        <div class="subtitle">수작업 도자기의 아름다움을 느껴보세요</div>
    </header>

    <div class="container">
        <div class="product">
            <img src="도자기.JPG">
            <h2>수제 그릇(제작중)</h2>
            <p>부드러운 곡선이 특징인 수작업 그릇의 제작 과정 입니다.</p>
        </div>

        <div class="product">
            <img src="도자기2.JPG">
            <h2>수제 그릇(제작 완료)</h2>
            <p>현대적인 감각이 더해진 감성 도자기 그릇입니다.</p>
        </div>

        <div class="product">
            <img src="https://yidomall.com/web/product/medium/201804/326_shop1_323205.jpg">
            <h2>수제 컵</h2>
            <p>전통적인 느낌의 도자기 찻잔으로 자연스러운 색감이 특징입니다.</p>
        </div>

        <div class="product">
            <img src="https://yidomall.com/web/upload/ezst/image/ez-image-contents-1l5fwzf-1-0etmjlr-42.jpg?v=1742201400428">
            <h2>달 항아리</h2>
            <p>심플하면서도 모던한 디자인의 수제 도자기 항아리입니다.</p>
        </div>
    </div>
</body>
</html>
